      GigabitEthernet0/0:
        type: ethernet
        alias: csr_ftd
        link: csr_ftd
        ipv4: 192.168.240.40/24
      GigabitEthernet0/1:
        type: ethernet
        alias: ftd_ep2
        link: ftd_ep2
        ipv4: 192.168.250.40/24
devices:
  IOU1:
    os: ios
    type: router
    custom:
      hostname: IOU1
      domain: cisco.com
    credentials:
      default:
        username: cisco
        password: cisco
      enable:
        password: cisco
    connections:
      telnet:
        class: lib.connectors.telnet_con.TelnetConnection
        protocol: telnet
        ip: 92.81.55.146
        port: 5091
      ssh:
        class: lib.connectors.ssh_con.SshConnection
        protocol: ssh
        ip: 192.168.200.10
        port: 22

topology:
  IOU1:
    interfaces:
      Ethernet0/0:
        alias: initial
        type: ethernet
        link: management
        ipv4: 192.168.200.10/24
      Ethernet0/1:
        type: ethernet
        link: guest1
        ipv4: 192.168.210.10/24
      Ethernet0/2:
        type: ethernet
        link: iou_iosv
        ipv4: 192.168.220.10/24